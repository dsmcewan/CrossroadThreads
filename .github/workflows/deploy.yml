name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Image derivatives are content-addressed; only re-encode sources that changed
      - name: Cache processed images
        uses: actions/cache@v4
        with:
          path: |
            public/images/designs
            .image-cache.json
          key: images-${{ hashFiles('crossroad_imgs/**', 'scripts/image-pipeline.ts') }}
          restore-keys: images-

      - run: npm ci

      - run: npm test

      # GITHUB_ACTIONS=true is set by the runner, which bakes in the /CrossroadThreads basePath
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
